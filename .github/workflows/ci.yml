# A git-marketplace plugin has no compiled build artifact, so `claude plugin validate` is the
# build/validation gate. A red run on this job blocks publish (push to main).
name: ci
on:
  push:
  pull_request:
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test (with coverage)
        run: npm run test
      - name: Install Claude Code
        run: npm i -g @anthropic-ai/claude-code@2.1.186
      - name: Validate plugins
        run: npm run validate
